name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Only one CI run per branch — cancel in-flight runs when a new commit lands
# so PR feedback is fresh and billing doesn't drown in duplicates.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # `npm ci` is stricter than `npm install`: fails the job if
      # package-lock.json is out of sync with package.json, which catches
      # "forgot to commit the lockfile" regressions at PR time.
      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      # Build with a placeholder RPC URL so vite doesn't warn about the
      # missing env var. Real deployments plug in a real one from secrets.
      - name: Production build
        run: npm run build
        env:
          VITE_QUICKNODE_RPC_URL: https://ci-placeholder.solana-mainnet.quiknode.pro/placeholder/
