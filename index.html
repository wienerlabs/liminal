<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#edf2fa" />
    <title>LIMINAL — Intelligent Execution Terminal</title>
    <meta
      name="description"
      content="LIMINAL — intelligent execution terminal on Solana. TWAP execution, Kamino yield, DFlow MEV-protected routing, Solflare-native UX."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap"
      rel="stylesheet"
    />
    <script>
      // Dev-mode global error trap — runtime hataları window.__LIMINAL_ERRORS__
      // dizisine yazılır, DevTools açmadan puppeteer üzerinden okunabilir.
      window.__LIMINAL_ERRORS__ = [];
      window.addEventListener("error", function (e) {
        window.__LIMINAL_ERRORS__.push({
          type: "error",
          message: e.message,
          source: e.filename,
          line: e.lineno,
          stack: e.error && e.error.stack ? e.error.stack : null,
        });
      });
      window.addEventListener("unhandledrejection", function (e) {
        var r = e.reason;
        window.__LIMINAL_ERRORS__.push({
          type: "rejection",
          message: r && r.message ? r.message : String(r),
          stack: r && r.stack ? r.stack : null,
        });
      });
      var _origErr = console.error;
      console.error = function () {
        var args = Array.prototype.slice.call(arguments);
        window.__LIMINAL_ERRORS__.push({
          type: "console.error",
          args: args.map(function (a) {
            if (a instanceof Error) return a.stack || String(a);
            if (typeof a === "string") return a;
            try {
              return JSON.stringify(a).slice(0, 500);
            } catch (_) {
              return String(a);
            }
          }),
        });
        _origErr.apply(console, args);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
