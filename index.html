    <script>
      // Dev-mode global error trap — sadece localhost/127.0.0.1/file:// üzerinde
      // aktif. Production'da (canlı domain) tamamen no-op çalışır, böylece
      // memory leak ve console.error hijack riski yoktur.
      (function () {
        var host = window.location.hostname;
        var isDev =
          host === "localhost" ||
          host === "127.0.0.1" ||
          host === "" ||
          host.endsWith(".local");
        if (!isDev) return;

        var MAX_ERRORS = 200;
        window.__LIMINAL_ERRORS__ = [];
        function push(entry) {
          window.__LIMINAL_ERRORS__.push(entry);
          if (window.__LIMINAL_ERRORS__.length > MAX_ERRORS) {
            window.__LIMINAL_ERRORS__.shift();
          }
        }
        window.addEventListener("error", function (e) {
          push({
            type: "error",
            message: e.message,
            source: e.filename,
            line: e.lineno,
            stack: e.error && e.error.stack ? e.error.stack : null,
          });
        });
        window.addEventListener("unhandledrejection", function (e) {
          var r = e.reason;
          push({
            type: "rejection",
            message: r && r.message ? r.message : String(r),
            stack: r && r.stack ? r.stack : null,
          });
        });
        var _origErr = console.error;
        console.error = function () {
          var args = Array.prototype.slice.call(arguments);
          push({
            type: "console.error",
            args: args.map(function (a) {
              if (a instanceof Error) return a.stack || String(a);
              if (typeof a === "string") return a;
              try {
                return JSON.stringify(a).slice(0, 500);
              } catch (_) {
                return String(a);
              }
            }),
          });
          _origErr.apply(console, args);
        };
      })();
    </script>
