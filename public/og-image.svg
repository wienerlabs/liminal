<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!--
    LIMINAL OG image — 1200×630 (OpenGraph + Twitter card standard).
    Pastel light background (matches app palette) with the six-blade
    spiral mark centered, wordmark below, and a single-line tagline.
    Pure SVG so it renders crisply on any client; most scrapers (Twitter,
    Discord, Telegram) now accept SVG directly.
  -->
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6ffdc"/>
      <stop offset="45%" stop-color="#daf9de"/>
      <stop offset="100%" stop-color="#cfecf3"/>
    </linearGradient>
    <radialGradient id="og-pink" cx="82%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#f9b2d7" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#f9b2d7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="og-blade" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1a1a" stop-opacity="1"/>
      <stop offset="65%" stop-color="#1a1a1a" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0.18"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <rect width="1200" height="630" fill="url(#og-pink)"/>

  <!-- Logo mark — top, centered horizontally -->
  <g transform="translate(600 230) scale(1.6)">
    <g><path d="M 0 -12 C 18 -30, 55 -35, 65 -8 C 68 8, 50 18, 30 14 C 16 11, 6 4, 0 -12 Z" fill="url(#og-blade)"/></g>
    <g transform="rotate(60)"><path d="M 0 -12 C 18 -30, 55 -35, 65 -8 C 68 8, 50 18, 30 14 C 16 11, 6 4, 0 -12 Z" fill="url(#og-blade)"/></g>
    <g transform="rotate(120)"><path d="M 0 -12 C 18 -30, 55 -35, 65 -8 C 68 8, 50 18, 30 14 C 16 11, 6 4, 0 -12 Z" fill="url(#og-blade)"/></g>
    <g transform="rotate(180)"><path d="M 0 -12 C 18 -30, 55 -35, 65 -8 C 68 8, 50 18, 30 14 C 16 11, 6 4, 0 -12 Z" fill="url(#og-blade)"/></g>
    <g transform="rotate(240)"><path d="M 0 -12 C 18 -30, 55 -35, 65 -8 C 68 8, 50 18, 30 14 C 16 11, 6 4, 0 -12 Z" fill="url(#og-blade)"/></g>
    <g transform="rotate(300)"><path d="M 0 -12 C 18 -30, 55 -35, 65 -8 C 68 8, 50 18, 30 14 C 16 11, 6 4, 0 -12 Z" fill="url(#og-blade)"/></g>
    <circle r="9" fill="#1a1a1a"/>
  </g>

  <!-- Wordmark -->
  <text
    x="600"
    y="465"
    text-anchor="middle"
    font-family="'Space Grotesk', system-ui, -apple-system, sans-serif"
    font-size="88"
    font-weight="700"
    letter-spacing="18"
    fill="#1a1a1a"
  >LIMINAL</text>

  <!-- Tagline -->
  <text
    x="600"
    y="520"
    text-anchor="middle"
    font-family="'Space Grotesk', system-ui, -apple-system, sans-serif"
    font-size="26"
    font-weight="500"
    fill="#5b6470"
  >Intelligent execution terminal on Solana</text>

  <!-- Partner strip -->
  <text
    x="600"
    y="580"
    text-anchor="middle"
    font-family="'JetBrains Mono', ui-monospace, monospace"
    font-size="16"
    letter-spacing="6"
    fill="#8a93a0"
  >DFLOW · KAMINO · QUICKNODE · SOLFLARE</text>
</svg>
