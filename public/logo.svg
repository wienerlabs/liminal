<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="LIMINAL">
  <defs>
    <!-- Radial gradient — blade tip near center fades from solid to soft -->
    <radialGradient id="liminal-blade" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1a1a" stop-opacity="1"/>
      <stop offset="65%" stop-color="#1a1a1a" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0.18"/>
    </radialGradient>
  </defs>
  <!--
    Six identical blades rotated 60° each around the center. Each blade is
    a teardrop / comet shape that spirals from an inner anchor outward.
    The cubic curves give the "flame" feel of the reference logo.
  -->
  <g transform="translate(100 100)">
    <g>
      <path
        d="M 0 -12
           C 18 -30, 55 -35, 65 -8
           C 68 8, 50 18, 30 14
           C 16 11, 6 4, 0 -12 Z"
        fill="url(#liminal-blade)"
      />
    </g>
    <g transform="rotate(60)">
      <path
        d="M 0 -12
           C 18 -30, 55 -35, 65 -8
           C 68 8, 50 18, 30 14
           C 16 11, 6 4, 0 -12 Z"
        fill="url(#liminal-blade)"
      />
    </g>
    <g transform="rotate(120)">
      <path
        d="M 0 -12
           C 18 -30, 55 -35, 65 -8
           C 68 8, 50 18, 30 14
           C 16 11, 6 4, 0 -12 Z"
        fill="url(#liminal-blade)"
      />
    </g>
    <g transform="rotate(180)">
      <path
        d="M 0 -12
           C 18 -30, 55 -35, 65 -8
           C 68 8, 50 18, 30 14
           C 16 11, 6 4, 0 -12 Z"
        fill="url(#liminal-blade)"
      />
    </g>
    <g transform="rotate(240)">
      <path
        d="M 0 -12
           C 18 -30, 55 -35, 65 -8
           C 68 8, 50 18, 30 14
           C 16 11, 6 4, 0 -12 Z"
        fill="url(#liminal-blade)"
      />
    </g>
    <g transform="rotate(300)">
      <path
        d="M 0 -12
           C 18 -30, 55 -35, 65 -8
           C 68 8, 50 18, 30 14
           C 16 11, 6 4, 0 -12 Z"
        fill="url(#liminal-blade)"
      />
    </g>
    <!-- Center dot — anchors the spiral -->
    <circle r="9" fill="#1a1a1a"/>
  </g>
</svg>
